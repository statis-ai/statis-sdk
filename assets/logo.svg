<svg xmlns="http://www.w3.org/2000/svg" width="280" height="64" viewBox="0 0 280 64">
  <style>
    .wordmark {
      font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -1px;
      fill: #f8fafc;
    }
    .cursor {
      fill: #3B82F6;
      animation: blink 1.1s step-start infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
  </style>
  <text x="4" y="50" class="wordmark">Statis</text>
  <rect x="188" y="12" width="6" height="44" rx="1" class="cursor" />
</svg>
