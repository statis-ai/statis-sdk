<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <style>
    @keyframes blink {
      0%   { opacity: 1; }
      50%  { opacity: 0; }
      100% { opacity: 1; }
    }
    .cursor {
      animation: blink 0.9s linear infinite;
    }
  </style>
  <rect width="800" height="120" rx="0" fill="#0a0a0a" />
  <text
    x="400" y="76"
    text-anchor="middle"
    font-family="ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace"
    font-size="56"
    font-weight="700"
    letter-spacing="-1"
    fill="#ffffff"
  >statis</text>
  <rect x="504" y="28" width="18" height="48" rx="2" fill="#ffffff" class="cursor" />
</svg>
